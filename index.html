<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Fast VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --shopee: #ee4d2d; --meli: #fff159; --bg: #0f0f0f; --card: #1a1a1a; --text: #f0f0f0; --green: #00ff88; --blue: #00d4ff; --red: #ff7675; --verify: #1d9bf0; }
        * { font-family: 'Poppins', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; color: var(--text); padding-bottom: 110px; overflow-x: hidden; }

        /* Push Real Banner */
        #push-banner {
            position: fixed; top: -300px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 400px; background: #fff; color: #000;
            border-radius: 20px; padding: 20px; z-index: 5000; display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9); transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid var(--blue);
        }
        #push-banner.show { top: 20px; }
        .btn-p { border: none; padding: 10px 18px; border-radius: 10px; font-weight: 800; font-size: 11px; cursor: pointer; }
        .btn-allow { background: var(--blue); color: #fff; }

        .app-container { width: 98%; max-width: 500px; margin: 0 auto; padding: 10px; }

        /* Header Premium */
        .header-premium { text-align: center; padding: 25px 0 15px 0; }
        .header-premium h2 { 
            margin: 0; font-size: 30px; font-weight: 900; 
            background: linear-gradient(135deg, #fff 20%, var(--green) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .verified-badge { color: var(--verify); font-size: 22px; }

        .online-count { font-size: 10px; color: #aaa; font-weight: 700; text-transform: uppercase; margin-top: 5px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .dot-green { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Filtros e Busca */
        .categories { display: flex; overflow-x: auto; gap: 15px; margin-bottom: 20px; padding: 5px 0; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 75px; }
        .cat-circle { width: 60px; height: 60px; background: #1a1a1a; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #333; margin-bottom: 6px; font-size: 24px; }
        
        .search-box { background: #1a1a1a; border-radius: 12px; padding: 12px 15px; margin-bottom: 15px; display: flex; align-items: center; border: 1px solid #333; }
        .search-box input { background: transparent; border: none; color: #fff; width: 100%; outline: none; margin-left: 8px; font-size: 13px; }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab { background: #222; padding: 12px; border-radius: 12px; font-size: 11px; cursor: pointer; border: 1px solid #333; flex: 1; text-align: center; font-weight: 800; color: #fff; }
        .tab.active { background: var(--blue); border-color: var(--blue); color: #000; }

        /* Vitrine Blindada */
        #vitrine { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .product-card { background: var(--card); border-radius: 18px; overflow: hidden; position: relative; border: 1px solid #252525; display: flex; flex-direction: column; }
        
        /* Tags */
        .origin-tag { position: absolute; top: 10px; right: 10px; padding: 5px 10px; border-radius: 8px; font-size: 8px; font-weight: 900; z-index: 20; text-transform: uppercase; backdrop-filter: blur(5px); }
        .tag-shopee { background: rgba(238, 77, 45, 0.9); color: #fff; }
        .tag-meli { background: rgba(255, 241, 89, 0.9); color: #2d3277; }
        
        .discount-tag { position: absolute; top: 10px; left: 10px; background: var(--green); color: #000; font-size: 10px; font-weight: 900; padding: 4px 8px; border-radius: 6px; z-index: 10; }
        
        .fav-btn { position: absolute; bottom: 120px; right: 10px; background: rgba(0,0,0,0.6); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; z-index: 30; border: none; color: #fff; font-size: 16px; }
        .fav-btn.active { color: var(--red); background: #fff; }

        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #fff; }
        
        .product-info { padding: 12px; flex-grow: 1; }
        .product-name { font-size: 11px; font-weight: 600; height: 32px; overflow: hidden; color: #eee; line-height: 1.2; margin-bottom: 8px; }
        
        /* Preços Cortados */
        .price-box { display: flex; flex-direction: column; gap: 2px; }
        .old-price { font-size: 10px; color: #777; text-decoration: line-through; font-weight: 600; }
        .price { font-size: 20px; font-weight: 900; color: var(--green); }
        
        /* Etiquetas de Benefício */
        .benefit-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
        .b-badge { font-size: 8px; font-weight: 800; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; border: 1px solid; }

        .btn-buy { border: none; width: 100%; padding: 15px; font-weight: 900; text-transform: uppercase; font-size: 10px; cursor: pointer; margin-top: 5px; }
        .btn-shopee { background: var(--shopee); color: #fff; }
        .btn-meli { background: var(--meli); color: #2d3277; }

        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 160px; background: rgba(20, 20, 20, 0.95); border-radius: 40px; display: flex; justify-content: space-around; padding: 15px; border: 1px solid var(--blue); z-index: 100; }
    </style>
</head>
<body>

<div id="push-banner">
    <div class="push-h">🔔 ALERTAS CLAUDINEI</div>
    <div style="font-size: 12px; font-weight: 600; color: #444;">Deseja ser notificado no celular sobre os achadinhos novos?</div>
    <div class="push-btns">
        <button class="btn-p" onclick="closePush()">NÃO</button>
        <button class="btn-p btn-allow" onclick="requestRealPush()">ATIVAR AGORA</button>
    </div>
</div>

<div class="app-container">
    <div class="header-premium">
        <h2>MEGA FAST <span class="verified-badge">✔</span></h2>
        <div class="online-count"><span class="dot-green"></span> <span id="user-online">154</span> ONLINE</div>
    </div>

    <div class="categories">
        <div class="cat-item" onclick="resetSearch()"><div class="cat-circle">⚡</div><span>Tudo</span></div>
        <div class="cat-item" onclick="searchByCat('cozinha')"><div class="cat-circle">🍳</div><span>Cozinha</span></div>
        <div class="cat-item" onclick="searchByCat('tech')"><div class="cat-circle">🖱️</div><span>Tech</span></div>
        <div class="cat-item" onclick="searchByCat('casa')"><div class="cat-circle">🏠</div><span>Casa</span></div>
    </div>

    <div class="search-box">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar produto..." onkeyup="search()">
    </div>

    <div class="tabs">
        <div class="tab active" id="tabAll" onclick="filterTab('all')">OFERTAS</div>
        <div class="tab" id="tabFav" onclick="filterTab('fav')">FAVORITOS ❤️</div>
    </div>

    <div id="vitrine"></div>
</div>

<nav class="bottom-nav">
    <span style="font-size:24px; cursor:pointer" onclick="location.reload()">🏠</span>
    <span style="font-size:24px; cursor:pointer" onclick="window.open('https://chat.whatsapp.com/L5u0qgtqHFBCxSbfNEG4oC')">💬</span>
</nav>

<script>
    const produtos = [
        { id: 1, loja: "shopee", nome: "Conjunto de Copos de Vidro Premium", p_antigo: 59.90, p: 34.00, img: "https://i.ibb.co/zTFmNXMx/99unxsg-11134201-7rdxi-mc2ffbg7mei476.jpg", link: "https://s.shopee.com.br/qfR8T2TWH", fav: false, cat: 'cozinha' },
        { id: 2, loja: "shopee", nome: "Smartwatch Ultra Series Especial", p_antigo: 149.00, p: 77.90, img: "https://i.ibb.co/20GjcyDM/no-mark-React-Native-snapshot-image-1.png", link: "https://s.shopee.com.br/30jvo7xISl", fav: false, cat: 'tech' },
        { id: 3, loja: "shopee", nome: "Fone de Ouvido Bluetooth Pro High", p_antigo: 65.00, p: 26.77, img: "https://i.ibb.co/hRgVkK0y/no-mark-React-Native-snapshot-image-2.png", link: "https://s.shopee.com.br/2LUF1GuwdD", fav: false, cat: 'tech' },
        { id: 4, loja: "mercado livre", nome: "Câmera de Segurança Inteligente Full HD", p_antigo: 129.00, p: 52.40, img: "https://i.ibb.co/BHgK1t2r/Screenshot-2026-04-09-19-34-42-998-com-mercadolibre.png", link: "https://meli.la/1FjycEH", fav: false, cat: 'casa' }
    ];

    function requestRealPush() {
        if (!('Notification' in window)) return;
        Notification.requestPermission().then(p => { if(p==='granted') { new Notification("Mega Fast VIP", {body: "Avisaremos você!"}); closePush(); } });
    }

    let idleTimer;
    function startIdleTimer() {
        clearTimeout(idleTimer);
        document.title = "Mega Fast VIP";
        idleTimer = setTimeout(() => { document.title = "⚠️ NOVOS ACHADOS POSTADOS!"; }, 50 * 60 * 1000); 
    }
    ['click', 'touchstart', 'scroll', 'mousemove'].forEach(e => document.addEventListener(e, startIdleTimer));

    function closePush() { document.getElementById('push-banner').classList.remove('show'); }
    setTimeout(() => { if(Notification.permission !== 'granted') document.getElementById('push-banner').classList.add('show'); }, 6000);

    let currentMode = 'all';
    function toggleFav(id) { const p = produtos.find(item => item.id === id); p.fav = !p.fav; search(); }
    function filterTab(mode) {
        currentMode = mode;
        document.getElementById('tabAll').classList.toggle('active', mode === 'all');
        document.getElementById('tabFav').classList.toggle('active', mode === 'fav');
        search();
    }

    function search() {
        const text = document.getElementById('searchInput').value.toLowerCase();
        let filtered = produtos.filter(p => p.nome.toLowerCase().includes(text) || p.cat.includes(text));
        if (currentMode === 'fav') filtered = filtered.filter(p => p.fav);
        render(filtered);
    }

    function searchByCat(cat) { document.getElementById('searchInput').value = cat; search(); }
    function resetSearch() { document.getElementById('searchInput').value = ''; search(); }

    function render(list) {
        const vitrine = document.getElementById('vitrine');
        vitrine.innerHTML = list.map(p => {
            const desconto = Math.round(((p.p_antigo - p.p) / p.p_antigo) * 100);
            const isShopee = p.loja === "shopee";
            return `
                <div class="product-card">
                    <div class="discount-tag">-${desconto}% OFF</div>
                    <div class="origin-tag ${isShopee ? 'tag-shopee' : 'tag-meli'}">${isShopee ? 'Shopee' : 'Mercado Livre'}</div>
                    <button class="fav-btn ${p.fav ? 'active' : ''}" onclick="toggleFav(${p.id})">❤</button>
                    <img src="${p.img}" class="product-img">
                    <div class="product-info">
                        <h3 class="product-name">${p.nome}</h3>
                        <div class="price-box">
                            <span class="old-price">De R$ ${p.p_antigo.toFixed(2)}</span>
                            <span class="price">R$ ${p.p.toFixed(2)}</span>
                        </div>
                        <div class="benefit-badges">
                            <span class="b-badge" style="color:var(--green)">Frete Grátis</span>
                            <span class="b-badge" style="color:var(--blue)">Oficial</span>
                        </div>
                    </div>
                    <button class="btn-buy ${isShopee ? 'btn-shopee' : 'btn-meli'}" onclick="window.open('${p.link}')">
                        ${isShopee ? 'VER NA SHOPEE' : 'VER NO MERCADO LIVRE'}
                    </button>
                </div>`;
        }).join('');
    }

    setInterval(() => {
        const count = Math.floor(Math.random() * (175 - 135 + 1)) + 135;
        document.getElementById('user-online').innerText = count;
    }, 4000);

    render(produtos);
    startIdleTimer();
</script>
</body>
</html>
