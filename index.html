<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Fast VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --shopee: #ee4d2d; --meli: #fff159; --bg: #0b0b0b; --card: #161616; --text: #f0f0f0; --green: #00ff88; --blue: #00d4ff; --red: #ff7675; --verify: #1d9bf0; }
        * { font-family: 'Poppins', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; color: var(--text); padding-bottom: 110px; overflow-x: hidden; }

        /* Banner Push iOS */
        #push-banner {
            position: fixed; top: -300px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 380px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            border-radius: 24px; padding: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); transition: 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #push-banner.show { top: 20px; }

        /* Prova Social 25s */
        #sale-notification {
            position: fixed; bottom: 100px; left: 20px; background: rgba(255, 255, 255, 0.95);
            color: #000; padding: 12px 18px; border-radius: 18px; font-size: 11px; font-weight: 700;
            display: flex; align-items: center; gap: 10px; z-index: 900;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateX(-180%); transition: 0.6s;
        }
        #sale-notification.show { transform: translateX(0); }
        .sale-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1s infinite; }

        .app-container { width: 98%; max-width: 500px; margin: 0 auto; padding: 10px; }
        .header-premium { text-align: center; padding: 25px 0; }
        .header-premium h2 { margin: 0; font-size: 32px; font-weight: 900; background: linear-gradient(135deg, #fff 30%, var(--green) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        
        .online-count { font-size: 10px; color: #666; font-weight: 800; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .dot-green { width: 7px; height: 7px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); }

        /* Categorias e Busca */
        .categories { display: flex; overflow-x: auto; gap: 12px; margin-bottom: 20px; padding: 5px 0; scrollbar-width: none; }
        .cat-circle { width: 55px; height: 55px; background: #1a1a1a; border-radius: 18px; display: flex; align-items: center; justify-content: center; border: 1px solid #222; font-size: 20px; margin-bottom: 6px; color: var(--blue); }
        
        .search-box { background: #161616; border-radius: 16px; padding: 14px; margin-bottom: 15px; display: flex; align-items: center; border: 1px solid #222; }
        .search-box input { background: transparent; border: none; color: #fff; width: 100%; outline: none; margin-left: 10px; font-size: 13px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { background: #161616; padding: 12px; border-radius: 14px; font-size: 11px; cursor: pointer; border: 1px solid #222; flex: 1; text-align: center; font-weight: 800; color: #888; }
        .tab.active { background: #fff; color: #000; border-color: #fff; }

        /* Vitrine Blindada */
        #vitrine { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .product-card { background: var(--card); border-radius: 22px; overflow: hidden; position: relative; border: 1px solid #222; display: flex; flex-direction: column; }
        
        .origin-tag { position: absolute; top: 10px; right: 10px; padding: 5px 10px; border-radius: 10px; font-size: 8px; font-weight: 900; z-index: 20; text-transform: uppercase; }
        .tag-shopee { background: var(--shopee); color: #fff; }
        .tag-meli { background: var(--meli); color: #2d3277; }
        
        .discount-tag { position: absolute; top: 10px; left: 10px; background: var(--green); color: #000; font-size: 9px; font-weight: 900; padding: 5px 8px; border-radius: 8px; z-index: 10; }
        
        .fav-btn { position: absolute; top: 45px; right: 10px; background: rgba(0,0,0,0.5); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; z-index: 30; border: none; color: #fff; }
        .fav-btn.active { color: var(--red); background: #fff; }

        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #fff; }
        
        .product-info { padding: 12px; flex-grow: 1; }
        .product-name { font-size: 11px; font-weight: 600; height: 32px; overflow: hidden; color: #ccc; line-height: 1.3; margin-bottom: 8px; }
        
        .old-price { font-size: 10px; color: #555; text-decoration: line-through; display: block; }
        .price { font-size: 20px; font-weight: 900; color: var(--green); }
        
        .benefit-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
        .b-badge { font-size: 8px; font-weight: 800; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; border: 1px solid; }

        .btn-buy { border: none; width: 100%; padding: 14px; font-weight: 900; text-transform: uppercase; font-size: 10px; cursor: pointer; }
        .btn-shopee { background: var(--shopee); color: #fff; }
        .btn-meli { background: #2d3277; color: #fff; border-top: 2px solid var(--meli); }

        .bottom-nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 180px; background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(25px); border-radius: 35px; display: flex; justify-content: space-around; 
            padding: 12px; border: 1px solid rgba(255,255,255,0.15); z-index: 1000; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .nav-icon { color: #fff; font-size: 20px; opacity: 0.6; cursor: pointer; }
        .nav-icon.active { opacity: 1; color: var(--blue); }
    </style>
</head>
<body>

<div id="sale-notification">
    <div class="sale-dot"></div>
    <span id="sale-text">Carregando ofertas...</span>
</div>

<div id="push-banner">
    <div style="font-weight: 800; color:#111">🔔 NOTIFICAÇÕES VIP</div>
    <div style="font-size: 13px; color:#444">Deseja ser avisado no celular sobre novos achadinhos?</div>
    <div style="display:flex; gap:10px; margin-top:10px">
        <button style="flex:1; padding:10px; border-radius:12px; border:none; background:#eee" onclick="closePush()">NÃO</button>
        <button style="flex:1; padding:10px; border-radius:12px; border:none; background:#111; color:#fff" onclick="requestRealPush()">ATIVAR</button>
    </div>
</div>

<div class="app-container">
    <div class="header-premium">
        <h2>MEGA FAST <span style="color:var(--verify); font-size: 20px;">✔</span></h2>
        <div class="online-count"><span class="dot-green"></span> <span id="user-online">154</span> NO SITE AGORA</div>
    </div>

    <div class="categories">
        <div class="cat-item" onclick="resetSearch()"><div class="cat-circle"><i class="fa-solid fa-bolt"></i></div><span>Tudo</span></div>
        <div class="cat-item" onclick="searchByCat('cozinha')"><div class="cat-circle"><i class="fa-solid fa-utensils"></i></div><span>Cozinha</span></div>
        <div class="cat-item" onclick="searchByCat('tech')"><div class="cat-circle"><i class="fa-solid fa-laptop"></i></div><span>Tech</span></div>
        <div class="cat-item" onclick="searchByCat('casa')"><div class="cat-circle"><i class="fa-solid fa-house-chimney"></i></div><span>Casa</span></div>
    </div>

    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass" style="color:#666"></i>
        <input type="text" id="searchInput" placeholder="Buscar oferta..." onkeyup="search()">
    </div>

    <div class="tabs">
        <div class="tab active" id="tabAll" onclick="filterTab('all')">OFERTAS</div>
        <div class="tab" id="tabFav" onclick="filterTab('fav')">FAVORITOS ❤️</div>
    </div>

    <div id="vitrine"></div>
</div>

<nav class="bottom-nav">
    <i class="fa-solid fa-house-user nav-icon active" onclick="location.reload()"></i>
    <i class="fa-solid fa-comment-dots nav-icon" onclick="window.open('https://chat.whatsapp.com/L5u0qgtqHFBCxSbfNEG4oC')"></i>
</nav>

<script>
    const produtos = [
        { id: 0, loja: "mercado livre", nome: "Torneira Cozinha Gourmet Monocomando Extensível", p_antigo: 249.90, p: 76.65, img: "https://i.ibb.co/8ns0YjWy/Screenshot-2026-04-15-19-09-40-939-com-mercadolibre-edit.jpg", link: "https://meli.la/1RqYExX", fav: false, cat: 'casa' },
        { id: 4, loja: "mercado livre", nome: "Câmera de Segurança Inteligente Full HD", p_antigo: 129.00, p: 52.40, img: "https://i.ibb.co/BHgK1t2r/Screenshot-2026-04-09-19-34-42-998-com-mercadolibre.png", link: "https://meli.la/1FjycEH", fav: false, cat: 'casa' },
        { id: 1, loja: "shopee", nome: "Conjunto de Copos de Vidro Premium", p_antigo: 59.90, p: 34.00, img: "https://i.ibb.co/zTFmNXMx/99unxsg-11134201-7rdxi-mc2ffbg7mei476.jpg", link: "https://s.shopee.com.br/qfR8T2TWH", fav: false, cat: 'cozinha' },
        { id: 2, loja: "shopee", nome: "Smartwatch Ultra Series Especial", p_antigo: 149.00, p: 77.90, img: "https://i.ibb.co/20GjcyDM/no-mark-React-Native-snapshot-image-1.png", link: "https://s.shopee.com.br/30jvo7xISl", fav: false, cat: 'tech' },
        { id: 3, loja: "shopee", nome: "Fone de Ouvido Bluetooth Pro High", p_antigo: 65.00, p: 26.77, img: "https://i.ibb.co/hRgVkK0y/no-mark-React-Native-snapshot-image-2.png", link: "https://s.shopee.com.br/2LUF1GuwdD", fav: false, cat: 'tech' }
    ];

    const cidades = ["São Paulo", "Rio de Janeiro", "Curitiba", "Salvador", "Fortaleza", "Manaus", "Recife", "Brasília", "Caculé"];
    const nomes = ["Ricardo", "Ana", "Marcos", "Julia", "Felipe", "Sandra", "Bruno", "Carla", "Claudinei"];

    function showSale() {
        const saleText = document.getElementById('sale-text');
        const saleDiv = document.getElementById('sale-notification');
        saleText.innerText = `${nomes[Math.floor(Math.random()*nomes.length)]} de ${cidades[Math.floor(Math.random()*cidades.length)]} comprou agora!`;
        saleDiv.classList.add('show');
        setTimeout(() => saleDiv.classList.remove('show'), 5000);
    }
    setInterval(showSale, 25000); 

    let idleTimer;
    function startIdleTimer() {
        clearTimeout(idleTimer);
        document.title = "Mega Fast VIP";
        idleTimer = setTimeout(() => { document.title = "⚠️ BUG DETECTADO! Volta logo!"; }, 50 * 60 * 1000); 
    }
    ['click', 'touchstart', 'scroll'].forEach(e => document.addEventListener(e, startIdleTimer));

    function requestRealPush() {
        if (!('Notification' in window)) return;
        Notification.requestPermission().then(p => { if(p==='granted') new Notification("Mega Fast", {body: "Alertas ativos!"}); closePush(); });
    }
    function closePush() { document.getElementById('push-banner').classList.remove('show'); }
    setTimeout(() => { if(Notification.permission !== 'granted') document.getElementById('push-banner').classList.add('show'); }, 4000);

    let currentMode = 'all';
    function toggleFav(id) { const p = produtos.find(i => i.id === id); p.fav = !p.fav; search(); }
    function filterTab(mode) { currentMode = mode; document.getElementById('tabAll').classList.toggle('active', mode==='all'); document.getElementById('tabFav').classList.toggle('active', mode==='fav'); search(); }
    function search() {
        const text = document.getElementById('searchInput').value.toLowerCase();
        let filtered = produtos.filter(p => p.nome.toLowerCase().includes(text) || p.cat.includes(text));
        if (currentMode === 'fav') filtered = filtered.filter(p => p.fav);
        render(filtered);
    }

    function render(list) {
        const vitrine = document.getElementById('vitrine');
        vitrine.innerHTML = list.map(p => {
            const isShopee = p.loja === "shopee";
            return `
                <div class="product-card">
                    <div class="discount-tag">-${Math.round(((p.p_antigo-p.p)/p.p_antigo)*100)}% OFF</div>
                    <div class="origin-tag ${isShopee ? 'tag-shopee' : 'tag-meli'}">${isShopee ? 'Shopee' : 'Mercado Livre'}</div>
                    <button class="fav-btn ${p.fav ? 'active' : ''}" onclick="toggleFav(${p.id})"><i class="fa-solid fa-heart"></i></button>
                    <img src="${p.img}" class="product-img">
                    <div class="product-info">
                        <h3 class="product-name">${p.nome}</h3>
                        <div class="price-box">
                            <span class="old-price">De R$ ${p.p_antigo.toFixed(2)}</span>
                            <span class="price">R$ ${p.p.toFixed(2)}</span>
                        </div>
                        <div class="benefit-badges">
                            <span class="b-badge" style="color:var(--green)">Frete Grátis</span>
                            <span class="b-badge" style="color:var(--blue)">Oficial</span>
                        </div>
                    </div>
                    <button class="btn-buy ${isShopee ? 'btn-shopee' : 'btn-meli'}" onclick="window.open('${p.link}')">
                        ${isShopee ? 'VER NA SHOPEE' : 'VER NO MERCADO LIVRE'}
                    </button>
                </div>`;
        }).join('');
    }
    function resetSearch() { document.getElementById('searchInput').value = ''; search(); }
    function searchByCat(cat) { document.getElementById('searchInput').value = cat; search(); }
    
    render(produtos);
    startIdleTimer();
    setInterval(() => { document.getElementById('user-online').innerText = Math.floor(Math.random()*(175-135+1))+135; }, 4000);
</script>
</body>
</html>
