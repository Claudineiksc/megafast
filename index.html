<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Fast VIP</title>
    <style>
        :root { --shopee: #ee4d2d; --bg: #0f0f0f; --card: #1a1a1a; --text: #f0f0f0; --green: #2ecc71; --blue: #00d4ff; --gold: #f1c40f; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 100px; }
        .app-container { width: 95%; max-width: 450px; margin: 0 auto; padding: 15px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { background: #252525; padding: 8px 15px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid #333; }
        .tab.active { background: var(--blue); border-color: var(--blue); color: #000; font-weight: bold; }

        .search-box { background: #252525; border-radius: 12px; padding: 12px; margin-bottom: 15px; display: flex; align-items: center; border: 1px solid #333; }
        .search-box input { background: transparent; border: none; color: #fff; width: 100%; outline: none; margin-left: 10px; }

        .product-card { border: 1px solid #252525; border-radius: 15px; margin-bottom: 20px; background: var(--card); overflow: hidden; position: relative; }
        .badge-fav { position: absolute; top: 10px; left: 10px; background: var(--gold); color: #000; font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 5px; z-index: 10; }
        
        .product-body { display: flex; padding: 15px; align-items: center; }
        .product-img { width: 100px; height: 100px; border-radius: 10px; object-fit: cover; margin-right: 15px; background: #fff; }
        
        .old-price { font-size: 12px; text-decoration: line-through; color: #666; }
        .price { font-size: 22px; font-weight: 900; color: var(--green); display: block; }
        
        .tags { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
        .tag-free { background: #00b894; color: #fff; font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        .tag-card { background: #0984e3; color: #fff; font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: bold; }

        /* --- BOTÃO COM FLASH SUAVE --- */
        .btn-buy { 
            border: none; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; 
            color: #fff; background: var(--shopee); text-transform: uppercase; 
            position: relative; overflow: hidden;
        }

        .btn-buy::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: skewX(-25deg);
            animation: moveFlash 4s infinite; /* 4 segundos para ficar bem calmo */
        }

        @keyframes moveFlash {
            0% { left: -150%; }
            30% { left: 150%; } /* O brilho passa rápido */
            100% { left: 150%; } /* E fica parado fora da tela pelo resto do tempo */
        }

        .bottom-nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 60%; background: #1a1a1a; border-radius: 40px; display: flex; justify-content: space-around; padding: 10px; border: 1px solid var(--blue); z-index: 100; }
    </style>
</head>
<body>

<div class="app-container">
    <div style="text-align:center; padding: 15px 0;">
        <h2 style="margin:0;">MEGA <span style="color:var(--green)">FAST</span> VIP</h2>
    </div>

    <div class="search-box">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Pesquisar..." onkeyup="search()">
    </div>

    <div class="tabs">
        <div class="tab active" id="tabAll" onclick="filterTab('all')">Todos</div>
        <div class="tab" id="tabFav" onclick="filterTab('fav')">⭐ Favoritos</div>
    </div>

    <div id="vitrine"></div>
</div>

<nav class="bottom-nav">
    <span style="font-size:25px">🏠</span>
    <span style="font-size:25px" onclick="window.open('https://chat.whatsapp.com/L5u0qgtqHFBCxSbfNEG4oC')">💬</span>
</nav>

<script>
    const produtos = [
        { nome: "Relógio Smartwatch D30 Bluetooth", v: 119.90, p: 39.90, img: "https://down-br.img.susercontent.com/file/sg-11134201-22120-f5u6u7p8p8p8p8", link: "https://s.shopee.com.br/9UxMe3BA8I", frete: true, parcelas: "3x s/ juros", fav: true },
        { nome: "Kit Potes de Cozinha Organizador", v: 89.90, p: 45.50, img: "https://down-br.img.susercontent.com/file/br-11134207-7qukw-lkx3v4y5l88p20", link: "https://s.shopee.com.br/40cQ5y9MZJ", frete: true, parcelas: "2x", fav: false },
        { nome: "Echo Dot Alexa 5ª Geração", v: 449.00, p: 329.00, img: "https://down-br.img.susercontent.com/file/br-11134207-7r98o-lkx3v4y5l88p20", link: "https://s.shopee.com.br/5fke53xscI", frete: true, parcelas: "10x s/ juros", fav: true },
        { nome: "Conjunto Jogo de Tapete Banheiro", v: 65.00, p: 29.90, img: "https://down-br.img.susercontent.com/file/sg-11134201-22100-8p8p8p8p8p8p8p", link: "https://s.shopee.com.br/3fzZhRUxF8", frete: true, parcelas: "2x", fav: false },
        { nome: "Copo Térmico Premium com Tampa", v: 95.00, p: 42.00, img: "https://down-br.img.susercontent.com/file/br-11134207-7r98o-m1p9p7p3p3p3p3", link: "https://s.shopee.com.br/30jsuEx4fp", frete: true, parcelas: "3x", fav: true }
    ];

    let currentMode = 'all';

    function render(list) {
        const vitrine = document.getElementById('vitrine');
        vitrine.innerHTML = '';
        list.forEach(p => {
            const badge = p.fav ? `<div class="badge-fav">⭐ FAVORITO</div>` : '';
            const freteTag = p.frete ? `<span class="tag-free">FRETE GRÁTIS</span>` : '';
            const cardTag = p.parcelas ? `<span class="tag-card">💳 ${p.parcelas}</span>` : '';
            
            vitrine.innerHTML += `
                <div class="product-card">
                    ${badge}
                    <div class="product-body">
                        <img src="${p.img}" class="product-img">
                        <div style="flex:1">
                            <h3 style="font-size:14px; margin:0 0 5px 0;">${p.nome}</h3>
                            <span class="old-price">R$ ${p.v.toFixed(2)}</span>
                            <span class="price">R$ ${p.p.toFixed(2)}</span>
                            <div class="tags">${freteTag} ${cardTag}</div>
                        </div>
                    </div>
                    <button class="btn-buy" onclick="window.open('${p.link}')">EU QUERO!</button>
                </div>`;
        });
    }

    function filterTab(mode) {
        currentMode = mode;
        document.getElementById('tabAll').classList.toggle('active', mode === 'all');
        document.getElementById('tabFav').classList.toggle('active', mode === 'fav');
        search();
    }

    function search() {
        const text = document.getElementById('searchInput').value.toLowerCase();
        let filtered = produtos.filter(p => p.nome.toLowerCase().includes(text));
        if (currentMode === 'fav') { filtered = filtered.filter(p => p.fav); }
        render(filtered);
    }

    render(produtos);
</script>
</body>
</html>
